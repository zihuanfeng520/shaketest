<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages 搖晃偵測</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { margin-bottom: 10px; color: #1a1a1a; }
        #status {
            font-size: 20px;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 300px;
        }
        #debug {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            font-family: monospace;
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        .shaking {
            animation: shake-anim 0.5s;
            background-color: #ff4757 !important; /* 晃動變紅 */
            color: white !important;
        }
        @keyframes shake-anim {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body id="body">

    <h1>搖晃偵測器 v2</h1>
    
    <div id="status">等待啟動...</div>
    
    <button id="startBtn" onclick="init()">點擊開始 (啟用音效)</button>

    <div id="debug"></div>

    <audio id="shakeSound" src="./shake.mp3" preload="auto"></audio>

    <script>
        // 設定參數
        const SHAKE_THRESHOLD = 15; // 加速度變化閾值 (iOS/Android 通用計算方式不同，這裡用重力變化)
        const COOLDOWN = 1000;      // 冷卻時間 1秒

        let lastX = null, lastY = null, lastZ = null;
        let lastShakeTime = 0;
        
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        const body = document.getElementById('body');
        const btn = document.getElementById('startBtn');
        const audio = document.getElementById('shakeSound');

        function init() {
            // 1. 嘗試預載並播放一小段靜音，解鎖 iOS/Android 的自動播放限制
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
                debugDiv.innerText += "音效解鎖成功\n";
            }).catch(e => {
                debugDiv.innerText += "音效解鎖失敗: " + e.message + "\n";
                alert("找不到音效檔！請確認 GitHub 上有 shake.mp3 且檔名小寫。");
            });

            // 2. 請求傳感器權限 (iOS 13+ 需要)
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            startSensing();
                        } else {
                            alert("需要傳感器權限才能運作！");
                        }
                    })
                    .catch(console.error);
            } else {
                // Android 或舊版 iOS
                startSensing();
            }
        }

        function startSensing() {
            btn.style.display = 'none'; // 隱藏按鈕
            statusDiv.innerText = "偵測中... 請搖晃手機";
            
            // 監聽加速度
            window.addEventListener('devicemotion', (event) => {
                // 為了相容性，我們使用 accelerationIncludingGravity (含重力)
                // 這樣在不同裝置上數值比較大，比較容易判定
                const acc = event.accelerationIncludingGravity;
                if (!acc) return;

                const currentX = acc.x;
                const currentY = acc.y;
                const currentZ = acc.z;

                if (lastX !== null) {
                    const deltaX = Math.abs(lastX - currentX);
                    const deltaY = Math.abs(lastY - currentY);
                    const deltaZ = Math.abs(lastZ - currentZ);

                    // 簡單的晃動判斷：如果任一軸向變化太大
                    if ((deltaX + deltaY + deltaZ) > SHAKE_THRESHOLD) {
                        triggerShake();
                    }
                }

                lastX = currentX;
                lastY = currentY;
                lastZ = currentZ;
            });
        }

        function triggerShake() {
            const now = Date.now();
            // 檢查冷卻時間，避免一次搖晃觸發十次聲音
            if (now - lastShakeTime > COOLDOWN) {
                lastShakeTime = now;
                
                // 播放聲音
                audio.currentTime = 0;
                audio.play().catch(e => console.log("播放錯誤", e));
                
                // 視覺效果
                statusDiv.innerText = "偵測到晃動！！";
                body.classList.add('shaking');
                
                // 手機震動
                if (navigator.vibrate) navigator.vibrate(200);

                setTimeout(() => {
                    body.classList.remove('shaking');
                    statusDiv.innerText = "偵測中...";
                }, 500);
            }
        }
    </script>
</body>
</html>
