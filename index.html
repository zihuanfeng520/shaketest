<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自動抓檔震動偵測</title>
    <style>
        /* --- 樣式設定 (維持不變) --- */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-touch-callout: none;
        }

        #settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background-color: #1a1a1a;
            color: white;
            transition: transform 0.3s ease;
            overflow-y: auto; /* 避免手機螢幕太小選項被切掉 */
        }

        #settings-panel.hidden {
            transform: translateY(-100%);
        }

        .control-group {
            margin-bottom: 20px;
            width: 80%;
            max-width: 300px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            background: #333;
            color: white;
        }

        button.start-btn {
            margin-top: 20px;
            margin-bottom: 50px;
            padding: 15px 50px;
            font-size: 20px;
            background-color: #d63031;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
        }
        
        button.start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 讀取中的提示 */
        #loading-msg {
            color: #f1c40f;
            font-size: 14px;
            margin-bottom: 10px;
            white-space: pre-wrap;
            text-align: center;
        }

        /* 待機層 */
        #standby-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #hint-text {
            position: absolute;
            bottom: 20px;
            color: #555;
            font-size: 12px;
            pointer-events: none;
        }

        #effect-image {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.1s, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #standby-layer.active #effect-image {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div id="settings-panel">
        <h2 style="margin-bottom: 10px;">自動抓檔震動偵測</h2>
        
        <div id="loading-msg">正在掃描 GitHub 檔案...</div>

        <div class="control-group">
            <label>選擇台詞 (MP3):</label>
            <select id="audioSelect">
                <option value="" disabled selected>讀取中...</option>
            </select>
        </div>

        <div class="control-group">
            <label>選擇圖片 (PNG/JPG):</label>
            <select id="imageSelect">
                <option value="" disabled selected>讀取中...</option>
            </select>
        </div>

        <div class="control-group">
            <label>音量: <span id="volValue">100%</span></label>
            <input type="range" id="volRange" min="0" max="1" step="0.1" value="1" oninput="updateLabels()">
        </div>

        <div class="control-group">
            <label>靈敏度 (小=敏): <span id="senseValue">150</span></label>
            <input type="range" id="senseRange" min="50" max="500" step="10" value="150" oninput="updateLabels()">
        </div>

        <button class="start-btn" id="startBtn" onclick="enterStandby()" disabled>🔴 進入待機</button>
    </div>

    <div id="standby-layer" ondblclick="exitStandby()">
        <img id="effect-image" src="" alt="Effect">
        <div id="hint-text">雙擊螢幕回到設定</div>
    </div>

    <audio id="mainAudio" preload="auto"></audio>

    <script>
        // ==========================================
        // ★★★ 這裡已經幫你設定好了 ★★★
        const GITHUB_USERNAME = 'zihuanfeng520'; 
        const REPO_NAME = 'shaketest';
        // ==========================================

        let shakeThreshold = 150; 
        const EFFECT_DURATION = 2000;
        
        let lastUpdate = 0;
        let lastX = null, lastY = null, lastZ = null;
        let isPlaying = false; 
        let isStandby = false;

        const settingsPanel = document.getElementById('settings-panel');
        const audioEl = document.getElementById('mainAudio');
        const imageEl = document.getElementById('effect-image');
        const audioSelect = document.getElementById('audioSelect');
        const imageSelect = document.getElementById('imageSelect');
        const loadingMsg = document.getElementById('loading-msg');
        const startBtn = document.getElementById('startBtn');

        // --- 自動讀取 GitHub 檔案 ---
        window.onload = function() {
            // 建構 GitHub API 網址
            const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error(`找不到倉庫 (代碼 ${response.status})`);
                    return response.json();
                })
                .then(data => {
                    // 清空選單
                    audioSelect.innerHTML = '';
                    imageSelect.innerHTML = '';

                    let hasAudio = false;
                    let hasImage = false;

                    // 遍歷所有檔案
                    if (Array.isArray(data)) {
                        data.forEach(file => {
                            const name = file.name.toLowerCase();
                            
                            // 判斷是否為 MP3
                            if (name.endsWith('.mp3')) {
                                const option = document.createElement('option');
                                option.value = file.name;
                                option.text = file.name;
                                audioSelect.appendChild(option);
                                hasAudio = true;
                            }

                            // 判斷是否為圖片
                            if (name.endsWith('.png') || name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.gif')) {
                                const option = document.createElement('option');
                                option.value = file.name;
                                option.text = file.name;
                                imageSelect.appendChild(option);
                                hasImage = true;
                            }
                        });
                    }

                    // 檢查是否有檔案
                    if (!hasAudio) audioSelect.innerHTML = '<option disabled>無 MP3 檔案</option>';
                    if (!hasImage) imageSelect.innerHTML = '<option disabled>無圖片檔案</option>';

                    if (hasAudio && hasImage) {
                        loadingMsg.innerText = "✅ 掃描完成！請選擇設定";
                        loadingMsg.style.color = "#2ecc71";
                        startBtn.disabled = false;
                        
                        // 預設選取第一個選項
                        audioSelect.selectedIndex = 0;
                        imageSelect.selectedIndex = 0;
                    } else {
                        loadingMsg.innerText = "⚠️ 找不到 .mp3 或圖片檔案\n請確認檔案已上傳且檔名為小寫";
                    }
                })
                .catch(error => {
                    console.error(error);
                    loadingMsg.innerText = "❌ 讀取失敗: " + error.message;
                    if(location.protocol === 'file:') {
                        loadingMsg.innerText += "\n(請上傳到 GitHub 後再測試)";
                    }
                });
            
            updateLabels();
        }

        function updateLabels() {
            document.getElementById('volValue').innerText = Math.round(document.getElementById('volRange').value * 100) + "%";
            document.getElementById('senseValue').innerText = document.getElementById('senseRange').value;
        }

        // --- 進入待機 ---
        function enterStandby() {
            const selectedAudio = audioSelect.value;
            const selectedImage = imageSelect.value;
            
            if (!selectedAudio || !selectedImage) {
                alert("請先確認有選擇音效和圖片！");
                return;
            }

            // 套用設定
            audioEl.src = selectedAudio;
            audioEl.volume = document.getElementById('volRange').value;
            imageEl.src = selectedImage;
            shakeThreshold = parseInt(document.getElementById('senseRange').value);

            // 解鎖音效
            audioEl.play().then(() => {
                audioEl.pause();
                audioEl.currentTime = 0;
            }).catch(e => console.log("音效解鎖失敗", e));

            toggleFullScreen(true);
            requestSensorPermission();

            settingsPanel.classList.add('hidden');
            isStandby = true;
            lastX = null; lastY = null; lastZ = null;
        }

        function exitStandby() {
            settingsPanel.classList.remove('hidden');
            isStandby = false;
            toggleFullScreen(false);
        }

        // --- 全螢幕與權限 (維持原樣) ---
        function toggleFullScreen(enable) {
            const doc = window.document;
            const docEl = doc.documentElement;
            if (enable) {
                const req = docEl.requestFullscreen || docEl.webkitRequestFullScreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
                if (req) req.call(docEl);
            } else {
                const exit = doc.exitFullscreen || doc.webkitExitFullscreen || doc.mozCancelFullScreen || doc.msExitFullscreen;
                if (exit) exit.call(doc);
            }
        }

        function requestSensorPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('devicemotion', handleMotion, false);
                }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion, false);
            }
        }

        function handleMotion(event) {
            if (!isStandby || isPlaying) return;

            let acceleration = event.accelerationIncludingGravity || event.acceleration;
            if (!acceleration) return;

            const curTime = new Date().getTime();

            if ((curTime - lastUpdate) > 10) {
                const diffTime = curTime - lastUpdate;
                lastUpdate = curTime;

                const x = acceleration.x;
                const y = acceleration.y;
                const z = acceleration.z;

                if (lastX === null) {
                    lastX = x; lastY = y; lastZ = z;
                    return;
                }

                const deltaX = Math.abs(x - lastX);
                const deltaY = Math.abs(y - lastY);
                const deltaZ = Math.abs(z - lastZ);
                const speed = (deltaX + deltaY + deltaZ) / diffTime * 10000;

                if (speed > shakeThreshold) {
                    triggerEffect();
                }

                lastX = x;
                lastY = y;
                lastZ = z;
            }
        }

        function triggerEffect() {
            if (isPlaying) return;
            isPlaying = true;

            const layer = document.getElementById('standby-layer');

            audioEl.currentTime = 0;
            audioEl.play().catch(e => console.log(e));
            if (navigator.vibrate) navigator.vibrate(200);

            layer.classList.add('active');

            setTimeout(() => {
                layer.classList.remove('active');
                isPlaying = false;
                lastX = null;
            }, EFFECT_DURATION);
        }
    </script>
</body>
</html>
