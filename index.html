<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拍桌觸發漫畫效果</title>
    <style>
        /* 全局設定：隱藏捲軸，禁止選取 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #000; /* 預設黑屏 */
            overflow: hidden;
            user-select: none;
            -webkit-touch-callout: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        /* 初始的啟動按鈕介面 */
        #start-screen {
            text-align: center;
            color: #fff;
            z-index: 10; /* 在最上層 */
        }

        button {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #d63031;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* 核心效果層：覆蓋整個螢幕 */
        #effect-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* 預設黑色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5; /* 比啟動介面低，但比其他內容高 */
            pointer-events: none; /* 讓點擊可以穿透，雖然這裡沒什麼好點的 */
            transition: background-color 0.1s step-start; /* 瞬間切換背景色 */
        }

        /* 圖片設定：預設隱藏 */
        #effect-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            opacity: 0; /* 預設透明 */
            transform: scale(0.8); /* 預設稍微縮小 */
            transition: opacity 0.1s step-start, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 彈跳效果 */
        }

        /* 觸發時的狀態 class */
        #effect-overlay.active {
            background-color: #fff !important; /* 背景瞬間變白 */
        }

        #effect-overlay.active #effect-image {
            opacity: 1; /* 圖片顯現 */
            transform: scale(1); /* 彈跳到正常大小 */
        }

    </style>
</head>
<body>

    <div id="start-screen">
        <h1>拍桌漫畫效果</h1>
        <p>請將手機靜置桌上，點擊開始</p>
        <button onclick="init()">🔴 啟動並進入黑屏</button>
    </div>

    <div id="effect-overlay">
        <img id="effect-image" src="igiari.png" alt="要吵架嗎！">
    </div>

    <audio id="myAudio" src="shake.mp3" preload="auto"></audio>

    <script>
        // --- 設定區 ---
        const SHAKE_THRESHOLD = 150;  // 觸發靈敏度 (越小越敏感)
        const EFFECT_DURATION = 1500; // 效果持續時間 (毫秒)，約 1.5 秒
        // -------------

        let lastUpdate = 0;
        let lastX = null, lastY = null, lastZ = null;
        let isPlaying = false; // 鎖定開關

        const startScreen = document.getElementById('start-screen');
        const overlay = document.getElementById('effect-overlay');
        const audio = document.getElementById('myAudio');

        function init() {
            // 1. 解鎖音效播放
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
            }).catch(e => alert("找不到音效檔 (shake.mp3)"));

            // 2. 請求傳感器權限
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') enterStandbyMode();
                        else alert("需要權限才能運作");
                    })
                    .catch(console.error);
            } else {
                enterStandbyMode();
            }
        }

        // 進入待機模式：隱藏按鈕，開始監聽
        function enterStandbyMode() {
            startScreen.style.display = 'none'; // 隱藏啟動介面，變為全黑
            startListening();
        }

        function startListening() {
            window.addEventListener('devicemotion', handleMotion, false);
        }

        function handleMotion(event) {
            // 如果正在播放效果，停止偵測
            if (isPlaying) return;

            let acceleration = event.accelerationIncludingGravity;
            if (!acceleration) acceleration = event.acceleration;
            if (!acceleration) return;

            const curTime = new Date().getTime();

            // 10ms 高頻偵測
            if ((curTime - lastUpdate) > 10) {
                const diffTime = curTime - lastUpdate;
                lastUpdate = curTime;

                const x = acceleration.x;
                const y = acceleration.y;
                const z = acceleration.z;

                if (lastX === null) {
                    lastX = x; lastY = y; lastZ = z;
                    return;
                }

                // 絕對值差計算公式
                const deltaX = Math.abs(x - lastX);
                const deltaY = Math.abs(y - lastY);
                const deltaZ = Math.abs(z - lastZ);
                const speed = (deltaX + deltaY + deltaZ) / diffTime * 10000;

                if (speed > SHAKE_THRESHOLD) {
                    triggerEffect();
                }

                lastX = x;
                lastY = y;
                lastZ = z;
            }
        }

        function triggerEffect() {
            if (isPlaying) return;
            isPlaying = true; // 鎖定

            // 1. 播放音效
            audio.currentTime = 0;
            audio.play().catch(e => console.log("播放失敗", e));
            if (navigator.vibrate) navigator.vibrate(300);

            // 2. 顯示視覺效果 (加 class)
            overlay.classList.add('active');

            // 3. 設定定時器，在指定時間後恢復黑屏
            setTimeout(() => {
                // 移除效果 class，恢復黑屏
                overlay.classList.remove('active');
                
                // 解鎖偵測，並重置座標以防誤觸
                isPlaying = false;
                lastX = null; lastY = null; lastZ = null;
            }, EFFECT_DURATION);
        }
    </script>
</body>
</html>
