<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>聲音觸發器</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-touch-callout: none;
        }

        #settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background-color: #1a1a1a;
            color: white;
            transition: transform 0.3s ease;
            overflow-y: auto;
        }

        #settings-panel.hidden {
            transform: translateY(-100%);
        }

        .control-group {
            margin-bottom: 20px;
            width: 80%;
            max-width: 320px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            color: #eee;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 16px;
            background: #333;
            color: white;
            outline: none;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #444;
            border-radius: 5px;
            outline: none;
            margin: 10px 0;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #0984e3;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
            margin-top: -8px;
            position: relative;
            z-index: 2;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #444;
            border-radius: 5px;
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: #0984e3;
            cursor: pointer;
        }

        #modeSelect {
            background-color: #0984e3;
            font-weight: bold;
            border: none;
        }

        button.start-btn {
            margin-top: 20px;
            margin-bottom: 50px;
            padding: 15px 60px;
            font-size: 20px;
            background-color: #d63031;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
            transition: transform 0.1s, background-color 0.2s;
            font-weight: bold;
        }

        button.start-btn:active {
            transform: scale(0.95);
        }

        button.start-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        #loading-msg {
            color: #f1c40f;
            font-size: 14px;
            margin-bottom: 15px;
            white-space: pre-wrap;
            text-align: center;
        }

        #standby-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #hint-text {
            position: absolute;
            bottom: 30px;
            color: #444;
            font-size: 14px;
            pointer-events: none;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            padding: 0 16px;
        }

        #effect-image {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.1s, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #standby-layer.active #effect-image {
            opacity: 1;
            transform: scale(1);
        }

        .warning-text {
            color: #ff7675;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="settings-panel">
        <h2 style="margin-bottom: 10px;">聲音觸發器</h2>

        <div id="loading-msg">正在掃描 GitHub 資料夾...</div>

        <!-- ✅ 新增：裝置模式 -->
        <div class="control-group">
            <label>裝置模式:</label>
            <select id="deviceModeSelect" onchange="changeDeviceMode()">
                <option value="mobile">📱 手機模式（搖晃/拍桌）</option>
                <option value="desktop">💻 電腦模式（點擊/鍵盤觸發）</option>
            </select>
            <small style="color:#888; display:block; margin-top:5px; font-size:12px;">
                （電腦模式下不需要感測器，點一下畫面或按空白鍵即可觸發）
            </small>
        </div>

        <!-- 原本：觸發模式（只在手機模式有意義） -->
        <div class="control-group" id="triggerModeGroup">
            <label>選擇觸發模式:</label>
            <select id="modeSelect" onchange="changeMode()">
                <option value="slap">✋ 拍桌模式</option>
                <option value="throw">⚾ 丟擲模式</option>
            </select>
            <div id="throwWarning" class="warning-text">⚠️ 警告：請抓緊手機！請勿真的鬆手丟出！</div>
        </div>

        <div class="control-group">
            <label>選擇聲音 (sound/):</label>
            <select id="audioSelect">
                <option value="" disabled selected>讀取中...</option>
            </select>
        </div>

        <div class="control-group">
            <label>選擇圖片 (picture/):</label>
            <select id="imageSelect">
                <option value="" disabled selected>讀取中...</option>
            </select>
        </div>

        <div class="control-group">
            <label>音量: <span id="volValue">100%</span></label>
            <input type="range" id="volRange" min="0" max="1" step="0.01" value="1" oninput="updateLabels()">
        </div>

        <!-- 原本：敏感度（只在手機模式有意義） -->
        <div class="control-group" id="sensitivityGroup">
            <label>觸發門檻值: <span id="senseValue">150</span></label>
            <input type="range" id="senseRange" min="10" max="4000" step="10" value="150" oninput="updateLabels()">
            <small style="color:#888; display:block; margin-top:5px; font-size:12px;">(數值越小越敏感，越大越難觸發)</small>
        </div>

        <button class="start-btn" id="startBtn" onclick="enterStandby()" disabled>開始</button>
    </div>

    <!-- ✅ 手機模式維持雙擊回設定；電腦模式我改成按 Esc 回設定（避免雙擊=兩次點擊觸發） -->
    <div id="standby-layer" ondblclick="handleStandbyDoubleClick()">
        <img id="effect-image" src="" alt="Effect">
        <div id="hint-text">提示</div>
    </div>

    <audio id="mainAudio" preload="auto"></audio>

    <script>
        // ==========================================
        // ★★★ 設定區 (已填好) ★★★
        const GITHUB_USERNAME = 'zihuanfeng520';
        const REPO_NAME = 'shaketest';
        // ==========================================

        let shakeThreshold = 150;

        let lastUpdate = 0;
        let lastX = null, lastY = null, lastZ = null;
        let isPlaying = false;
        let isStandby = false;

        // ✅ 新增：裝置模式
        let deviceMode = 'mobile'; // mobile | desktop

        // ✅ 防止雙擊/連點造成多次觸發
        let lastTriggerAt = 0;

        const settingsPanel = document.getElementById('settings-panel');
        const audioEl = document.getElementById('mainAudio');
        const imageEl = document.getElementById('effect-image');
        const audioSelect = document.getElementById('audioSelect');
        const imageSelect = document.getElementById('imageSelect');
        const loadingMsg = document.getElementById('loading-msg');
        const startBtn = document.getElementById('startBtn');
        const modeSelect = document.getElementById('modeSelect');
        const senseRange = document.getElementById('senseRange');
        const throwWarning = document.getElementById('throwWarning');
        const layer = document.getElementById('standby-layer');

        // ✅ 新增：UI 相關元素
        const deviceModeSelect = document.getElementById('deviceModeSelect');
        const triggerModeGroup = document.getElementById('triggerModeGroup');
        const sensitivityGroup = document.getElementById('sensitivityGroup');
        const hintText = document.getElementById('hint-text');

        // --- 初始化: 讀取 GitHub 檔案 ---
        window.onload = function () {
            const soundApi = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/sound`;
            const pictureApi = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/picture`;

            loadingMsg.innerText = "正在連線 GitHub API...";

            Promise.all([
                fetch(soundApi).then(res => { if (!res.ok) throw new Error("找不到 sound 資料夾"); return res.json(); }),
                fetch(pictureApi).then(res => { if (!res.ok) throw new Error("找不到 picture 資料夾"); return res.json(); })
            ])
                .then(([soundData, pictureData]) => {
                    // 音效
                    audioSelect.innerHTML = '';
                    let hasAudio = false;
                    if (Array.isArray(soundData)) {
                        soundData.forEach(file => {
                            const name = file.name.toLowerCase();
                            if (name.endsWith('.mp3') || name.endsWith('.wav') || name.endsWith('.ogg') || name.endsWith('.m4a')) {
                                const option = document.createElement('option');
                                option.value = `sound/${file.name}`;
                                option.text = file.name;
                                audioSelect.appendChild(option);
                                hasAudio = true;
                            }
                        });
                    }

                    // 圖片
                    imageSelect.innerHTML = '';
                    let hasImage = false;
                    if (Array.isArray(pictureData)) {
                        pictureData.forEach(file => {
                            const name = file.name.toLowerCase();
                            if (name.endsWith('.png') || name.endsWith('.jpg') || name.endsWith('.jpeg') || name.endsWith('.gif')) {
                                const option = document.createElement('option');
                                option.value = `picture/${file.name}`;
                                option.text = file.name;
                                imageSelect.appendChild(option);
                                hasImage = true;
                            }
                        });
                    }

                    if (hasAudio && hasImage) {
                        loadingMsg.innerText = "✅ 讀取成功！";
                        loadingMsg.style.color = "#2ecc71";
                        startBtn.disabled = false;
                        audioSelect.selectedIndex = 0;
                        imageSelect.selectedIndex = 0;
                    } else {
                        loadingMsg.innerText = "⚠️ 讀取不完整，請檢查 sound/picture 資料夾";
                    }
                })
                .catch(error => {
                    console.error(error);
                    loadingMsg.innerText = "❌ 讀取失敗: " + error.message;
                });

            changeMode();
            changeDeviceMode();
            updateLabels();

            audioEl.onended = function () {
                resetEffect();
            };
        }

        // --- 觸發模式（拍桌/丟擲） ---
        function changeMode() {
            const mode = modeSelect.value;
            if (mode === 'slap') {
                senseRange.min = "10";
                senseRange.max = "1000";
                senseRange.value = "500";
                throwWarning.style.display = 'none';
            } else {
                senseRange.min = "1000";
                senseRange.max = "10000";
                senseRange.value = "6000";
                throwWarning.style.display = 'block';
            }
            updateLabels();
        }

        // 新增：裝置模式偵測與切換
        function detectDefaultDeviceMode() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            // 明確判斷行動裝置
            const isMobileUA = /android|iphone|ipad|ipod/i.test(ua);

            if (isMobileUA) return 'mobile';

            // 其他一律當桌機（Windows / macOS / Linux）
            return 'desktop';

        }

        function getEffectiveDeviceMode() {
            if (deviceMode === 'auto') return detectDefaultDeviceMode();
            return deviceMode;
        }

        function changeDeviceMode() {
            deviceMode = deviceModeSelect.value;
            const effective = deviceMode;

            if (effective === 'desktop') {
                triggerModeGroup.style.display = 'none';
                sensitivityGroup.style.display = 'none';
                throwWarning.style.display = 'none';
            } else {
                triggerModeGroup.style.display = '';
                sensitivityGroup.style.display = '';
                changeMode();
            }
        }

        function updateLabels() {
            document.getElementById('volValue').innerText = Math.round(document.getElementById('volRange').value * 100) + "%";
            document.getElementById('senseValue').innerText = document.getElementById('senseRange').value;
        }

        // --- 進入待機 ---
        function enterStandby() {
            const selectedAudio = audioSelect.value;
            const selectedImage = imageSelect.value;

            if (!selectedAudio || !selectedImage) {
                alert("請先等待檔案讀取完成！");
                return;
            }

            audioEl.src = selectedAudio;
            audioEl.volume = document.getElementById('volRange').value;
            imageEl.src = selectedImage;
            shakeThreshold = parseInt(document.getElementById('senseRange').value);

            // 解鎖音效（行動裝置常需要 user gesture 才能播放）
            audioEl.play().then(() => {
                audioEl.pause();
                audioEl.currentTime = 0;
            }).catch(e => console.log("音效讀取失敗", e));

            toggleFullScreen(true);

            const effective = deviceMode;
            if (effective === 'mobile') {
                requestSensorPermission();
                unbindDesktopControls();
                hintText.innerText = "雙擊螢幕回到設定";
            } else {
                // desktop
                bindDesktopControls();
                hintText.innerText = "點擊螢幕或按空白鍵觸發｜按 Esc 回到設定";
            }

            settingsPanel.classList.add('hidden');
            isStandby = true;
            lastX = null; lastY = null; lastZ = null;
            lastTriggerAt = 0;
        }

        function exitStandby() {
            settingsPanel.classList.remove('hidden');
            isStandby = false;
            audioEl.pause();
            audioEl.currentTime = 0;
            resetEffect();
            toggleFullScreen(false);
            unbindDesktopControls();
        }

        // ✅ 讓手機維持雙擊回設定，但電腦模式避免雙擊（因為會包含兩次 click）
        function handleStandbyDoubleClick() {
            const effective = deviceMode;
            if (effective === 'mobile') {
                exitStandby();
            }
        }

        function toggleFullScreen(enable) {
            const doc = window.document;
            const docEl = doc.documentElement;
            if (enable) {
                const req = docEl.requestFullscreen || docEl.webkitRequestFullScreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
                if (req) req.call(docEl);
            } else {
                const exit = doc.exitFullscreen || doc.webkitExitFullscreen || doc.mozCancelFullScreen || doc.msExitFullscreen;
                if (exit) exit.call(doc);
            }
        }

        function requestSensorPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('devicemotion', handleMotion, false);
                }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion, false);
            }
        }

        function handleMotion(event) {
            if (!isStandby || isPlaying) return;

            let acceleration = event.accelerationIncludingGravity || event.acceleration;
            if (!acceleration) return;

            const curTime = new Date().getTime();

            if ((curTime - lastUpdate) > 10) {
                const diffTime = curTime - lastUpdate;
                lastUpdate = curTime;

                const x = acceleration.x;
                const y = acceleration.y;
                const z = acceleration.z;

                if (lastX === null) {
                    lastX = x; lastY = y; lastZ = z;
                    return;
                }

                const deltaX = Math.abs(x - lastX);
                const deltaY = Math.abs(y - lastY);
                const deltaZ = Math.abs(z - lastZ);
                const speed = (deltaX + deltaY + deltaZ) / diffTime * 10000;

                if (speed > shakeThreshold) {
                    triggerEffect();
                }

                lastX = x;
                lastY = y;
                lastZ = z;
            }
        }

        // ✅ 電腦模式：點擊/鍵盤觸發
        function onDesktopTrigger() {
            if (!isStandby) return;
            triggerEffect();
        }

        function onKeyTrigger(e) {
            if (!isStandby) return;

            if (e.code === 'Escape') {
                e.preventDefault();
                exitStandby();
                return;
            }

            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                triggerEffect();
            }
        }

        function bindDesktopControls() {
            layer.addEventListener('click', onDesktopTrigger);
            window.addEventListener('keydown', onKeyTrigger);
        }

        function unbindDesktopControls() {
            layer.removeEventListener('click', onDesktopTrigger);
            window.removeEventListener('keydown', onKeyTrigger);
        }

        function triggerEffect() {
            const now = Date.now();
            if (now - lastTriggerAt < 350) return;
            lastTriggerAt = now;

            if (isPlaying) return;
            isPlaying = true;

            audioEl.currentTime = 0;
            audioEl.play()
                .then(() => {
                    layer.classList.add('active');
                })
                .catch(e => {
                    console.log("播放失敗", e);
                    resetEffect();
                });

            if (navigator.vibrate) navigator.vibrate(200);
        }

        function resetEffect() {
            layer.classList.remove('active');
            isPlaying = false;
            lastX = null;
        }
    </script>
</body>

</html>
